backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Startseite"
    files:
      - file: "content/home.md"
        label: "Startseite Inhalt"
        name: "home"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "Text", name: "body", widget: "markdown" }
